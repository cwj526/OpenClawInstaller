# ============================================================
# OpenClaw 配置文件示例
# 复制此文件到 ~/.openclaw/config.yaml 并修改相关配置
# 详细文档: https://clawd.bot/docs/config
# ============================================================

# 配置版本
version: "1.0"

# 调试模式（生产环境请设为 false）
debug: false

# ============================================================
# AI 模型配置（当前项目默认通过 Tuzi API 接入）
# 注意：安装器和配置菜单会直接写入 ~/.openclaw/openclaw.json
# 此 YAML 仅作为说明示例保留
# ============================================================
llm:
  # 当前激活分组
  active_group: claude-code

  # API Key 获取地址：https://api.tu-zi.com/token
  # 注意：Claude-Code 和 Codex 需要使用各自独立的 Key
  groups:
    claude_code:
      provider: tuzi-claude-code
      group: Claude-Code
      api_key: "sk-your-claude-code-key"
      base_url: "https://api.tu-zi.com"
      api_type: "anthropic-messages"
      model: "claude-sonnet-4-6"
      models: "claude-sonnet-4-6,claude-opus-4-6"

    codex:
      provider: tuzi-codex
      group: Codex
      api_key: "sk-your-codex-key"
      base_url: "https://api.tu-zi.com/v1"
      api_type: "openai-responses"
      model: "gpt-5.4"
      models: "gpt-5.4,gpt-5.2-high"

  # 脚本支持重复添加两个分组
  # 最后一次配置的分组会成为当前默认模型来源

  # 模型参数
  max_tokens: 4096          # 最大输出 token 数
  temperature: 0.7          # 温度参数 (0-1)，越高越随机
  top_p: 0.9                # Top-p 采样
  
  # 重试配置
  retry:
    max_attempts: 3         # 最大重试次数
    delay: 1000             # 重试间隔（毫秒）

# Claude-Code 可选模型：
# claude-sonnet-4-6
# claude-sonnet-4-6-thinking
# claude-sonnet-4-5-20250929-thinking
# claude-sonnet-4-5-20250929
# claude-sonnet-4-20250514-thinking
# claude-sonnet-4-20250514
# claude-opus-4-6
# claude-opus-4-5-20251101-thinking
# claude-opus-4-5-20251101
# claude-opus-4-5
# claude-opus-4-20250514-thinking
# claude-opus-4-20250514

# Codex 可选模型：
# gpt-5.4
# gpt-5.3-codex
# gpt-5.2-medium
# gpt-5.2-high
# gpt-5.2-codex
# gpt-5.2
# gpt-5.1-high
# gpt-5.1-medium
# gpt-5.1-low
# gpt-5.1-codex-max-high
# gpt-5.1-codex-max
# gpt-5.1
# gpt-5-codex
# gpt-5-high
# gpt-5-low
# gpt-5

# ============================================================
# 身份与个性配置
# ============================================================
identity:
  # 助手名称
  bot_name: "Clawd"
  
  # 如何称呼你
  user_name: "主人"
  
  # 时区（用于定时任务和时间显示）
  # 常用: Asia/Shanghai, Asia/Tokyo, America/New_York, Europe/London
  timezone: "Asia/Shanghai"
  
  # 语言
  language: "zh-CN"
  
  # 个性描述（System Prompt 的一部分）
  personality: |
    你是一个聪明、幽默、有创造力的AI助手，名叫 Clawd。
    你善于分析问题，提供有见地的建议。
    你的回复简洁有力，避免冗长的解释。
    你会记住用户的偏好和之前的对话内容。
    当不确定时，你会诚实地说不知道。
  
  # 额外的系统指令
  system_instructions: |
    - 优先使用中文回复
    - 代码块使用正确的语法高亮
    - 重要信息使用 emoji 标注

# ============================================================
# 网关配置
# ============================================================
gateway:
  # 监听地址（127.0.0.1 仅本机访问，0.0.0.0 允许外部访问）
  host: "127.0.0.1"
  
  # 监听端口
  port: 18789
  
  # API 密钥（用于 HTTP API 鉴权）
  # api_key: "your-gateway-api-key"

# ============================================================
# 消息渠道配置
# ============================================================
channels:
  # ----------------------------------------------------------
  # Telegram 配置
  # ----------------------------------------------------------
  telegram:
    enabled: false
    
    # Bot Token（从 @BotFather 获取）
    token: "your-telegram-bot-token"
    
    # 允许使用的用户 ID 列表（从 @userinfobot 获取）
    # 留空允许所有人（不推荐）
    allowed_users:
      - "123456789"
      # - "another-user-id"
    
    # 允许的群组 ID（可选）
    # allowed_groups:
    #   - "-1001234567890"
    
    # 代理配置（可选，用于网络受限环境）
    # proxy:
    #   host: "127.0.0.1"
    #   port: 7890
    #   type: "socks5"  # http / socks5

  # ----------------------------------------------------------
  # Discord 配置
  # ----------------------------------------------------------
  discord:
    enabled: false
    
    # Bot Token（从 Discord Developer Portal 获取）
    token: "your-discord-bot-token"
    
    # 允许的频道 ID 列表
    channels:
      - "channel-id-1"
      # - "channel-id-2"
    
    # 允许的用户 ID（可选，留空允许所有频道成员）
    # allowed_users:
    #   - "user-id"

  # ----------------------------------------------------------
  # WhatsApp 配置
  # ----------------------------------------------------------
  whatsapp:
    enabled: false
    
    # WhatsApp 使用二维码登录，运行 openclaw onboard --provider whatsapp

  # ----------------------------------------------------------
  # Slack 配置
  # ----------------------------------------------------------
  slack:
    enabled: false
    
    # Bot Token (xoxb-...)
    bot_token: "xoxb-your-bot-token"
    
    # App Token (xapp-...)
    app_token: "xapp-your-app-token"
    
    # 允许的频道
    channels:
      - "general"

  # ----------------------------------------------------------
  # 微信配置
  # ----------------------------------------------------------
  wechat:
    enabled: false
    # 微信接入需要额外配置，运行 openclaw onboard --provider wechat

  # ----------------------------------------------------------
  # iMessage 配置 (仅 macOS)
  # ----------------------------------------------------------
  imessage:
    enabled: false
    # 需要完整磁盘访问权限，运行 openclaw onboard --provider imessage

  # ----------------------------------------------------------
  # 飞书配置 (Feishu/Lark)
  # ----------------------------------------------------------
  feishu:
    enabled: false
    
    # App ID（从飞书开放平台获取）
    app_id: "your-feishu-app-id"
    
    # App Secret（从飞书开放平台获取）
    app_secret: "your-feishu-app-secret"
    
    # 连接模式: "websocket"（长连接，推荐）或 "webhook"
    # 使用 websocket 长连接无需公网服务器
    # 在飞书后台「事件与回调」选择「使用长连接接收事件」
    connection_mode: "websocket"
    
    # 域名: "feishu"（国内）或 "lark"（国际版）
    domain: "feishu"
    
    # 群聊中是否需要 @机器人 才响应
    require_mention: true
    
    # ---- 以下配置仅 webhook 模式需要 ----
    # 事件订阅验证 Token（仅 webhook 模式需要）
    # verify_token: "your-verify-token"
    
    # 加密密钥（可选，仅 webhook 模式需要）
    # encrypt_key: "your-encrypt-key"
    
    # Webhook 路径（仅 webhook 模式需要）
    # webhook_path: "/channels/feishu/webhook"

# ============================================================
# 记忆系统配置
# ============================================================
memory:
  # 是否启用记忆
  enabled: true
  
  # 记忆存储路径
  storage_path: "~/.openclaw/data/memory"
  
  # 最大上下文长度（token）
  max_context_length: 32000
  
  # 记忆保留天数（0 = 永久保留）
  retention_days: 0
  
  # 自动总结（超过一定长度自动生成摘要）
  auto_summarize:
    enabled: true
    threshold: 10000  # 触发总结的 token 阈值

# ============================================================
# Skills 技能系统
# ============================================================
skills:
  # 是否启用技能系统
  enabled: true
  
  # 技能文件目录
  path: "~/.openclaw/skills"
  
  # 内置技能开关
  builtin:
    daily_report: true      # 每日报告
    morning_briefing: true  # 晨间简报
    reminder: true          # 智能提醒
    web_search: true        # 网络搜索
    code_runner: false      # 代码执行（需要启用 shell 权限）

# ============================================================
# 安全配置
# ============================================================
security:
  # 允许执行系统命令（危险！）
  enable_shell_commands: false
  
  # 允许文件访问（危险！）
  enable_file_access: false
  
  # 允许网络浏览
  enable_web_browsing: true
  
  # 沙箱模式（推荐开启）
  sandbox_mode: true
  
  # 命令黑名单（禁止执行的命令）
  command_blacklist:
    - "rm -rf"
    - "sudo"
    - "chmod"
    - "chown"
  
  # 文件访问白名单（仅当 enable_file_access 为 true 时生效）
  file_whitelist:
    - "~/.openclaw/"
    - "~/Documents/"
  
  # 敏感信息过滤
  sensitive_filter:
    enabled: true
    patterns:
      - "password"
      - "secret"
      - "api_key"
      - "token"

# ============================================================
# 定时任务配置
# ============================================================
scheduler:
  # 是否启用定时任务
  enabled: true
  
  # 任务列表
  tasks:
    # 晨间简报
    - name: "morning_briefing"
      cron: "30 7 * * *"      # 每天 07:30
      skill: "morning-briefing"
      channels:
        - telegram
    
    # 每日报告
    - name: "daily_report"
      cron: "0 20 * * *"      # 每天 20:00
      skill: "daily-report"
      channels:
        - telegram

# ============================================================
# 日志配置
# ============================================================
logging:
  # 日志级别: debug / info / warn / error
  level: "info"
  
  # 日志文件路径
  path: "~/.openclaw/logs"
  
  # 单个日志文件最大大小
  max_size: "10MB"
  
  # 保留的日志文件数量
  max_files: 5
  
  # 是否输出到控制台
  console: true
  
  # 日志格式: json / text
  format: "text"

# ============================================================
# 高级配置
# ============================================================
advanced:
  # 并发请求限制
  concurrency: 5
  
  # 请求超时（秒）
  timeout: 120
  
  # 消息队列配置
  queue:
    max_size: 100
    process_interval: 100   # 毫秒
  
  # 健康检查
  health_check:
    enabled: true
    interval: 60            # 秒
    endpoint: "/health"
